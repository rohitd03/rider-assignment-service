name: Docker

on:
  workflow_run:
    workflows: [CI]       # must match the `name:` field in ci.yml exactly
    types: [completed]
    branches: [main]

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    # Only run when CI passed — this is the cross-workflow dependency gate.
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write     # required to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the exact commit that CI tested, not the workflow trigger SHA.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rohitd03/rider-assignment-service:${{ github.event.workflow_run.head_sha }}
            ghcr.io/rohitd03/rider-assignment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
